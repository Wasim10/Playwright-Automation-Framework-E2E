trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Test
    displayName: 'Playwright Tests'
    jobs:
      - job: RunTests
        displayName: 'Run Playwright Tests'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps chromium firefox
            displayName: 'Install Playwright browsers'

          - script: ENV_NAME=demo npx playwright test --project=chromium --project=firefox --grep-invert "Sample Test"
            displayName: 'Run Playwright tests'
            env:
              BASE_URL: $(BASE_URL)
              SECRET_KEY: $(SECRET_KEY)
              USER_NAME: $(USER_NAME)
              PASSWORD: $(PASSWORD)
              ENV_NAME: demo

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/*.xml'
              mergeTestResults: true
              testRunTitle: 'Playwright Tests'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload Playwright report'
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload test results'
            condition: always()
            inputs:
              targetPath: 'test-results'
              artifact: 'test-results'
              publishLocation: 'pipeline'

          - script: |
              npm install -g allure-commandline
              npx allure generate allure-results --clean
            displayName: 'Generate Allure report'
            condition: always()

          - task: PublishPipelineArtifact@1
            displayName: 'Upload Allure report'
            condition: always()
            inputs:
              targetPath: 'allure-report'
              artifact: 'allure-report'
              publishLocation: 'pipeline'